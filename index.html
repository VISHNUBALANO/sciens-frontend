<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Sciens — Login</title>
  <link rel="stylesheet" href="index.css" />
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@300;400;500;600&family=Space+Mono&display=swap" rel="stylesheet"/>
</head>
<body class="login-body">

  <div class="login-bg">
    <div class="login-noise"></div>
    <div class="login-grid"></div>
    <div class="orb orb1"></div>
    <div class="orb orb2"></div>
    <div class="orb orb3"></div>
  </div>

  <div class="login-container">
    <div class="login-left">
      <div class="login-brand">
        <div class="brand-mark">S</div>
        <div class="brand-text">
          <span class="brand-name">SCIENS</span>
          <span class="brand-sub">MEDIA COMMAND</span>
        </div>
      </div>
      <div class="login-tagline">
        <h1>Your team's<br/><em>social universe</em><br/>— centralized.</h1>
        <p>Plan, track, and deliver content across every platform with clarity and speed.</p>
      </div>
      <div class="login-stats">
        <div class="stat"><span class="stat-num">8</span><span class="stat-label">Clients</span></div>
        <div class="stat"><span class="stat-num">6</span><span class="stat-label">Platforms</span></div>
        <div class="stat"><span class="stat-num">∞</span><span class="stat-label">Possibilities</span></div>
      </div>
    </div>

    <div class="login-right">
      <div class="login-card">
        <div class="card-header">
          <h2>Welcome back</h2>
          <p>Sign in to your workspace</p>
        </div>

        <div class="error-msg" id="errorMsg">Invalid credentials. Please try again.</div>

        <div class="form-group">
          <label for="username">Username</label>
          <div class="input-wrap">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><circle cx="12" cy="8" r="4"/><path d="M4 20c0-4 3.6-7 8-7s8 3 8 7"/></svg>
            <input type="text" id="username" placeholder="Enter username" autocomplete="off"/>
          </div>
        </div>

        <div class="form-group">
          <label for="password">Password</label>
          <div class="input-wrap">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><rect x="3" y="11" width="18" height="11" rx="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>
            <input type="password" id="password" placeholder="Enter password" autocomplete="off"/>
            <button class="eye-btn" id="eyeBtn" onclick="togglePassword()">
              <svg id="eyeIcon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
            </button>
          </div>
        </div>

        <button class="login-btn" id="loginBtn" onclick="handleLogin()">
          <span>Sign In</span>
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M5 12h14M12 5l7 7-7 7"/></svg>
        </button>

        <div class="login-footer">
          <span class="mono">SCIENS © 2026</span>
        </div>
      </div>
    </div>
  </div>

  <script src="app.js"></script>
</body>
</html>
